name: PHP Test

on: pull_request

permissions:
  contents: read

concurrency:
  group: phpunit-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest-low
    outputs:
      php-version: ${{ steps.versions.outputs.php-available-list }}
      server-max: ${{ steps.versions.outputs.branches-max-list }}
    steps:
      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get version matrix
        id: versions
        uses: icewind1991/nextcloud-version-matrix@8a7bac6300b2f0f3100088b297995a229558ddba # v1.3.2

  changes:
    runs-on: ubuntu-latest-low
    permissions:
      contents: read
      pull-requests: read

    outputs:
      src: ${{ steps.changes.outputs.src}}

    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        continue-on-error: true
        with:
          filters: |
            src:
              - '.github/workflows/**'
              - '.gtihub/workflows/**'
              - 'appinfo/**'
              - 'lib/**'
              - 'templates/**'
              - 'tests/**'
              - 'vendor/**'
              - 'vendor-bin/**'
              - '.php-cs-fixer.dist.php'
              - 'composer.json'
              - 'composer.lock'

  phpunit-databases:
    runs-on: ubuntu-latest

    needs: [changes, matrix]
    if: needs.changes.outputs.src != 'false'

    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.matrix.outputs.php-version) }}
        server-versions: ${{ fromJson(needs.matrix.outputs.server-max) }}
        database:
          - type: mariadb
            display: MariaDB 10.6
            version: '10.6'
            install-type: mysql
            host: 127.0.0.1
            port: '4444'
            name: nextcloud
            user: root
            pass: rootpassword
          - type: mariadb
            display: MariaDB 11.4
            version: '11.4'
            install-type: mysql
            host: 127.0.0.1
            port: '4444'
            name: nextcloud
            user: root
            pass: rootpassword
          - type: postgres
            display: PostgreSQL 16
            version: '16'
            install-type: pgsql
            host: 127.0.0.1
            port: '5432'
            name: nextcloud
            user: postgres
            pass: postgres
          - type: sqlite
            display: SQLite
            version: ''
            install-type: sqlite
            host: ''
            port: ''
            name: nextcloud
            user: ''
            pass: ''

    name: ${{ matrix.database.display }} PHP ${{ matrix.php-versions }} Nextcloud ${{ matrix.server-versions }}

    steps:
      - name: Set app env
        if: ${{ env.APP_NAME == '' }}
        run: |
          # Split and keep last
          echo "APP_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Checkout server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          repository: nextcloud/server
          ref: ${{ matrix.server-versions }}

      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: apps/${{ env.APP_NAME }}

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          # https://docs.nextcloud.com/server/stable/admin_manual/installation/source_installation.html#prerequisites-for-manual-installation
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, mysql, pdo_mysql, pgsql, pdo_pgsql, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
          # Temporary workaround for missing pcntl_* in PHP 8.3
          ini-values: disable_functions=
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start MariaDB
        if: matrix.database.type == 'mariadb'
        run: |
          docker run --detach --name integration-davc-mariadb \
            --publish 4444:3306 \
            --env MARIADB_ROOT_PASSWORD=rootpassword \
            ghcr.io/nextcloud/continuous-integration-mariadb-${{ matrix.database.version }}:latest

          timeout 60s bash -c 'until docker exec integration-davc-mariadb mariadb-admin ping -uroot -prootpassword >/dev/null 2>&1; do sleep 2; done'

      - name: Start PostgreSQL
        if: matrix.database.type == 'postgres'
        run: |
          docker run --detach --name integration-davc-postgres \
            --publish 5432:5432 \
            --env POSTGRES_DB=nextcloud \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            postgres:${{ matrix.database.version }}

          timeout 60s bash -c 'until docker exec integration-davc-postgres pg_isready -U postgres >/dev/null 2>&1; do sleep 2; done'

      - name: Enable ONLY_FULL_GROUP_BY MariaDB option
        if: matrix.database.type == 'mariadb'
        run: |
          echo "SET GLOBAL sql_mode=(SELECT CONCAT(@@sql_mode,',ONLY_FULL_GROUP_BY'));" | mysql -h ${{ matrix.database.host }} -P ${{ matrix.database.port }} -u ${{ matrix.database.user }} -p${{ matrix.database.pass }}
          echo 'SELECT @@sql_mode;' | mysql -h ${{ matrix.database.host }} -P ${{ matrix.database.port }} -u ${{ matrix.database.user }} -p${{ matrix.database.pass }}

      - name: Check composer file existence
        id: check_composer
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: apps/${{ env.APP_NAME }}/composer.json

      - name: Set up dependencies
        # Only run if phpunit config file exists
        if: steps.check_composer.outputs.files_exists == 'true'
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer remove nextcloud/ocp --dev --no-scripts
          composer i

      - name: Set up Nextcloud
        run: |
          mkdir data
          if [[ "${{ matrix.database.type }}" = 'sqlite' ]]; then
            ./occ maintenance:install --verbose --database=${{ matrix.database.install-type }} --database-name=${{ matrix.database.name }} --admin-user admin --admin-pass admin
          else
            ./occ maintenance:install --verbose --database=${{ matrix.database.install-type }} --database-name=${{ matrix.database.name }} --database-host=${{ matrix.database.host }} --database-port=${{ matrix.database.port }} --database-user=${{ matrix.database.user }} --database-pass=${{ matrix.database.pass }} --admin-user admin --admin-pass admin
          fi
          ./occ app:enable --force ${{ env.APP_NAME }}

      - name: Check PHPUnit script is defined
        id: check_phpunit
        continue-on-error: true
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer run --list | grep '^  test:unit ' | wc -l | grep 1

      - name: PHPUnit
        # Only run if phpunit config file exists
        if: steps.check_phpunit.outcome == 'success'
        working-directory: apps/${{ env.APP_NAME }}
        run: composer run test:unit

      - name: Check PHPUnit integration script is defined
        id: check_integration
        continue-on-error: true
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer run --list | grep '^  test:integration ' | wc -l | grep 1

      - name: Run Nextcloud
        # Only run if phpunit integration config file exists
        if: steps.check_integration.outcome == 'success'
        run: php -S localhost:8080 &

      - name: PHPUnit integration
        # Only run if phpunit integration config file exists
        if: steps.check_integration.outcome == 'success'
        working-directory: apps/${{ env.APP_NAME }}
        run: composer run test:integration

      - name: Print logs
        if: always()
        run: |
          cat data/nextcloud.log

      - name: Skipped
        # Fail the action when neither unit nor integration tests ran
        if: steps.check_phpunit.outcome == 'failure' && steps.check_integration.outcome == 'failure'
        run: |
          echo 'Neither PHPUnit nor PHPUnit integration tests are specified in composer.json scripts'
          exit 1

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest-low
    needs: [changes, php-tests]

    if: always()

    name: php-test-summary

    steps:
      - name: PHP Test Summary status
        run: if ${{ needs.changes.outputs.src != 'false' && needs.php-tests.result != 'success' }}; then exit 1; fi