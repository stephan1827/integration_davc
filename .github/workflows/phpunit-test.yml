name: PHP Test

on: pull_request

permissions:
  contents: read

env:
  APP_NAME: integration_davc

concurrency:
  group: php-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest-low
    outputs:
      php-version: ${{ steps.versions.outputs.php-available-list }}
      php-min: ${{ steps.versions.outputs.php-min }}
      php-max: ${{ steps.versions.outputs.php-max }}
      server-max: ${{ steps.versions.outputs.branches-max-list }}
    steps:
      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get version matrix
        id: versions
        uses: icewind1991/nextcloud-version-matrix@8a7bac6300b2f0f3100088b297995a229558ddba # v1.3.2

  changes:
    runs-on: ubuntu-latest-low
    permissions:
      contents: read
      pull-requests: read

    outputs:
      src: ${{ steps.changes.outputs.src}}

    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        continue-on-error: true
        with:
          filters: |
            src:
              - '.github/workflows/**'
              - 'appinfo/**'
              - 'lib/**'
              - 'templates/**'
              - 'tests/**'
              - 'vendor/**'
              - 'vendor-bin/**'
              - '.php-cs-fixer.dist.php'
              - 'composer.json'
              - 'composer.lock'

  php-unit:
    runs-on: ubuntu-latest

    needs: [changes, matrix]
    if: needs.changes.outputs.src != 'false'

    strategy:
      matrix:
        php-versions: ['8.2', '${{ needs.matrix.outputs.php-max }}']
        server-versions: ${{ fromJson(needs.matrix.outputs.server-max) }}

    name: Unit PHP ${{ matrix.php-versions }} Nextcloud ${{ matrix.server-versions }}

    steps:
      - name: Checkout server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          repository: nextcloud/server
          ref: ${{ matrix.server-versions }}

      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: apps/${{ env.APP_NAME }}

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          # https://docs.nextcloud.com/server/stable/admin_manual/installation/source_installation.html#prerequisites-for-manual-installation
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
          # Temporary workaround for missing pcntl_* in PHP 8.3
          ini-values: disable_functions=

      - name: Check composer file existence
        id: check_composer
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: apps/${{ env.APP_NAME }}/composer.json

      - name: Set up dependencies
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer remove nextcloud/ocp --dev --no-scripts
          composer i

      - name: Set up Nextcloud
        run: |
          mkdir data
          ./occ maintenance:install --verbose --database=sqlite --database-name=nextcloud --admin-user admin --admin-pass admin
          ./occ app:enable --force ${{ env.APP_NAME }}

      - name: Run tests
        working-directory: apps/${{ env.APP_NAME }}
        run: composer run test:unit

  php-databases:
    runs-on: ubuntu-latest

    needs: [changes, matrix]
    if: needs.changes.outputs.src != 'false'

    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.matrix.outputs.php-version) }}
        server-versions: ${{ fromJson(needs.matrix.outputs.server-max) }}
        database:
          - type: mariadb
            display: MariaDB 11.4
            version: '11.4'
            install-type: mysql
            host: 127.0.0.1
            port: '3306'
            name: nextcloud
            user: nextcloud
            pass: nextcloud
          - type: postgres
            display: PostgreSQL 16
            version: '16'
            install-type: pgsql
            host: 127.0.0.1
            port: '5432'
            name: nextcloud
            user: nextcloud
            pass: nextcloud
          - type: sqlite
            display: SQLite
            version: ''
            install-type: sqlite
            host: ''
            port: ''
            name: nextcloud
            user: ''
            pass: ''

    name: DB Integration ${{ matrix.database.display }} PHP ${{ matrix.php-versions }} Nextcloud ${{ matrix.server-versions }}

    services:
      mariadb-service:
        image: ${{ matrix.database.type == 'mariadb' && format('ghcr.io/nextcloud/continuous-integration-mariadb-{0}:latest', matrix.database.version) || 'ghcr.io/nextcloud/continuous-integration-mariadb-11.4:latest' }}
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: nextcloud
          MARIADB_USER: nextcloud
          MARIADB_PASSWORD: nextcloud
        ports:
          - 3306:3306/tcp
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5
      postgres-service:
        image: ${{ matrix.database.type == 'postgres' && format('ghcr.io/nextcloud/continuous-integration-postgres-{0}:latest', matrix.database.version) || 'ghcr.io/nextcloud/continuous-integration-postgres-16:latest' }}
        env:
          POSTGRES_USER: nextcloud
          POSTGRES_DB: nextcloud
          POSTGRES_PASSWORD: nextcloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Enable ONLY_FULL_GROUP_BY MariaDB option
        if: matrix.database.type == 'mariadb'
        run: |
          echo "SET GLOBAL sql_mode=(SELECT CONCAT(@@sql_mode,',ONLY_FULL_GROUP_BY'));" | mysql -h 127.0.0.1 -u root -prootpassword
          echo 'SELECT @@sql_mode;' | mysql -h 127.0.0.1 -u root -prootpassword

      - name: Checkout server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          repository: nextcloud/server
          ref: ${{ matrix.server-versions }}

      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: apps/${{ env.APP_NAME }}

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          # https://docs.nextcloud.com/server/stable/admin_manual/installation/source_installation.html#prerequisites-for-manual-installation
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, pgsql, pdo_pgsql
          coverage: none
          ini-file: development
          # Temporary workaround for missing pcntl_* in PHP 8.3
          ini-values: disable_functions=
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check composer file existence
        id: check_composer
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: apps/${{ env.APP_NAME }}/composer.json

      - name: Set up dependencies
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer remove nextcloud/ocp --dev --no-scripts
          composer i
          
      - name: Set up Nextcloud
        env:
          DB_INSTALL_TYPE: ${{ matrix.database['install-type'] }}
          DB_HOST: ${{ matrix.database.host }}
          DB_PORT: ${{ matrix.database.port }}
          DB_NAME: ${{ matrix.database.name }}
          DB_USER: ${{ matrix.database.user }}
          DB_PASS: ${{ matrix.database.pass }}
        run: |
          mkdir data
          if [[ "$DB_INSTALL_TYPE" == 'sqlite' ]]; then
            ./occ maintenance:install --verbose \
              --database=sqlite \
              --database-name="$DB_NAME" \
              --admin-user admin \
              --admin-pass admin
          else
            ./occ maintenance:install --verbose \
              --database="$DB_INSTALL_TYPE" \
              --database-name="$DB_NAME" \
              --database-host="$DB_HOST" \
              --database-port="$DB_PORT" \
              --database-user="$DB_USER" \
              --database-pass="$DB_PASS" \
              --admin-user admin \
              --admin-pass admin
          fi
          ./occ app:enable --force ${{ env.APP_NAME }}

      - name: Run tests
        working-directory: apps/${{ env.APP_NAME }}
        run: composer run test:integration:db

  php-dav:
    runs-on: ubuntu-latest

    needs: [changes, matrix]
    if: needs.changes.outputs.src != 'false'

    env:
      STALWART_ADMIN_PWD: adminpassword
      DAV_PROTOCOL: http
      DAV_HOST: localhost
      DAV_PORT: 10080
      DAV_PATH: /.well-known/caldav
      DAV_DOMAIN: example.com
      DAV_USERNAME: user1@example.com
      DAV_PASSWORD: mysecretpassword

    services:
      mail-stalwart-service:
        image: stalwartlabs/stalwart:v0.15.5
        env:
          STALWART_ADMIN_PASSWORD: ${{ env.STALWART_ADMIN_PWD }}
        ports:
          - 10080:8080
          - 10025:25
          - 10143:143
          - 10993:993

    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.matrix.outputs.php-version) }}
        server-versions: ${{ fromJson(needs.matrix.outputs.server-max) }}

    name: DAV Integration SQLite PHP ${{ matrix.php-versions }} Nextcloud ${{ matrix.server-versions }}

    steps:
      - name: Wait for dav server admin API
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf -m 5 http://localhost:10080/login >/dev/null 2>&1; then
              exit 0
            fi

            if [ "$attempt" -eq 30 ]; then
              echo 'Stalwart admin API did not become ready in time.' >&2
              exit 1
            fi

            sleep 2
          done

      - name: Create domain and account in dav server
        run: |
          curl -sf -X POST http://localhost:10080/api/principal \
            -u "admin:${{ env.STALWART_ADMIN_PWD }}" \
            -H 'Content-Type: application/json' \
            -d '{"type":"domain","name":"${{ env.DAV_DOMAIN }}"}'
          curl -sf -X POST http://localhost:10080/api/principal \
            -u "admin:${{ env.STALWART_ADMIN_PWD }}" \
            -H 'Content-Type: application/json' \
            -d '{"type":"individual","name":"${{ env.DAV_USERNAME }}","secrets":["${{ env.DAV_PASSWORD }}"],"emails":["${{ env.DAV_USERNAME }}"],"roles":["user"]}'

      - name: Set up DNS for DAV discovery
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsmasq-base
          sudo mkdir -p /etc/dnsmasq.d

          sudo cp /etc/resolv.conf /etc/dnsmasq-upstream-resolv.conf

          cat <<EOF | sudo tee /etc/dnsmasq.d/integration-davc.conf >/dev/null
          port=53
          listen-address=127.0.0.1
          bind-interfaces
          resolv-file=/etc/dnsmasq-upstream-resolv.conf
          address=/${{ env.DAV_DOMAIN }}/127.0.0.1
          srv-host=_caldav._tcp.${{ env.DAV_DOMAIN }},${{ env.DAV_HOST }},10080,0,0
          EOF

          sudo pkill dnsmasq || true
          sudo dnsmasq --conf-dir=/etc/dnsmasq.d

          printf 'nameserver 127.0.0.1\noptions timeout:1 attempts:3\n' | sudo tee /etc/resolv.conf >/dev/null

      - name: Verify DNS discovery records
        run: |
          php -r '$records = dns_get_record("_caldav._tcp.${{ env.DAV_DOMAIN }}", DNS_SRV); if ($records === false || $records === [] || ($records[0]["target"] ?? "") !== "${{ env.DAV_HOST }}") { fwrite(STDERR, "SRV lookup failed\n"); exit(1); }'
          getent hosts ${{ env.DAV_HOST }}

      - name: Checkout server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          repository: nextcloud/server
          ref: ${{ matrix.server-versions }}

      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: apps/${{ env.APP_NAME }}

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          # https://docs.nextcloud.com/server/stable/admin_manual/installation/source_installation.html#prerequisites-for-manual-installation
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
          # Temporary workaround for missing pcntl_* in PHP 8.3
          ini-values: disable_functions=

      - name: Check composer file existence
        id: check_composer
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: apps/${{ env.APP_NAME }}/composer.json

      - name: Set up dependencies
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer remove nextcloud/ocp --dev --no-scripts
          composer i

      - name: Set up Nextcloud
        run: |
          mkdir data
          ./occ maintenance:install --verbose --database=sqlite --database-name=nextcloud --admin-user admin --admin-pass admin
          ./occ config:system:set allow_local_remote_servers --value="true"
          ./occ app:enable --force ${{ env.APP_NAME }}

      - name: Run tests
        working-directory: apps/${{ env.APP_NAME }}
        run: composer run test:integration:dav

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest-low
    needs: [changes, php-unit, php-databases, php-dav]

    if: always()

    name: php-test-summary

    steps:
      - name: PHP Test Summary status
        run: if ${{ needs.changes.outputs.src != 'false' && (needs.php-unit.result != 'success' || needs.php-databases.result != 'success' || needs.php-dav.result != 'success') }}; then exit 1; fi